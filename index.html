<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addy - Watch Ads</title>
    
    <script async="async" data-cfasync="false" src="https://pl29598725.effectivecpmnetwork.com/18d26b8c79bd224a8c6664a4e7271241/invoke.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0 0 25px 0;
        }

        .stats-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .stats-value {
            color: var(--accent);
            font-size: 20px;
            font-weight: bold;
        }

        .ad-box {
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 10px;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <h1>Addy</h1>
            <p>Watch interesting ads here.</p>
        </div>

        <div class="stats-bar">
            <span class="stats-label">Ads Viewed Today:</span>
            <span class="stats-value" id="viewCount">0</span>
        </div>

        <div class="ad-box">
            <div id="container-18d26b8c79bd224a8c6664a4e7271241"></div>
        </div>

        <button class="btn" onclick="refreshAd()">Next Ad</button>

    </div>

    <script>
        // Instantly load views from cache
        let views = localStorage.getItem('addy_views') || 0;
        document.getElementById('viewCount').innerText = views;

        function refreshAd() {
            // Instantly update counter and instantly refresh page
            views++;
            localStorage.setItem('addy_views', views);
            window.location.reload(); 
        }
    </script>

</body>
</html>
